<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>2ГИС — Экран офиса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Шрифт грузим НЕ блокируя рендер: на слабых ТВ сеть может зависнуть -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;800&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;800&display=swap"></noscript>
<style>
  :root {
    --brand: #2DBE00;
    --brand-deep: #15890A;
    --bg: #07100A;
    --ink: #ffffff;
    --muted: rgba(255,255,255,.45);
    --pad: clamp(20px, 3vw, 48px);
    --frame-gap: clamp(16px, 2.2vw, 36px);
    --radius: clamp(16px, 1.8vw, 28px);
    --font: "Geist", "Segoe UI", system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    cursor: none;
  }

  /* ── Тёмная сцена (полный экран) ── */
  #stage {
    position: fixed; inset: 0;
    background: var(--bg);
  }

  /* ── Рамка-фрейм для медиа ── */
  #media-frame {
    position: absolute;
    inset: var(--frame-gap);
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    /* лёгкая зелёная обводка — без тяжёлых blur-теней (ТВ их не тянут) */
    box-shadow:
      0 0 0 1.5px rgba(45,190,0,.35),
      0 8px 32px rgba(0,0,0,.5);
  }

  /* ── Слайды внутри фрейма ── */
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    opacity: 0;
    transition: opacity 0.6s linear;
  }
  .slide.visible { opacity: 1; }
  /* картинки — contain (текст не обрезается) */
  .slide img   { width: 100%; height: 100%; object-fit: contain; display: block; }
  /* видео — cover (заполняет фрейм без чёрных полос) */
  .slide video { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── Оверлей поверх сцены ── */
  #overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  /* верхний градиентный scrim для читаемости */
  #overlay::before {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 180px; z-index: -1;
    background: linear-gradient(180deg, rgba(7,16,10,.7) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ── Верхняя строка: логотип + часы ── */
  .top {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    padding: var(--pad);
  }

  /* ── Логотип ── */
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 18px 8px 9px;
    background: rgba(255,255,255,.96);
    border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  .logo svg  { display: block; border-radius: 8px; }
  .logo .word { font-weight: 800; font-size: clamp(18px, 1.6vw, 24px); line-height: 1; color: #1a1a1a; }

  /* ── Часы ── */
  .clock {
    text-align: right;
    text-shadow: 0 2px 18px rgba(0,0,0,.6);
  }
  .clock .time {
    display: inline-block;
    font-size: clamp(44px, 5vw, 78px); font-weight: 600;
    font-variant-numeric: tabular-nums; line-height: 1;
    letter-spacing: -2px; white-space: nowrap;
  }
  .clock .dateline {
    margin-top: 8px;
    display: flex; align-items: center; justify-content: flex-end; gap: 9px;
  }
  .clock .weekday {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: clamp(14px, 1.4vw, 20px); font-weight: 500;
    color: rgba(255,255,255,.92); text-transform: capitalize;
  }
  .clock .weekday::before {
    content: ""; width: 7px; height: 7px; flex-shrink: 0;
    border-radius: 50%; background: var(--brand);
    box-shadow: 0 0 10px rgba(45,190,0,.9);
  }
  .clock .weekday::after {
    content: ""; width: 4px; height: 4px; margin-left: 2px;
    border-radius: 50%; background: rgba(255,255,255,.28);
  }
  .clock .date {
    font-size: clamp(14px, 1.4vw, 20px); font-weight: 500; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Прогресс-бар (нижняя полоска) ── */
  .bottom { padding: 0 var(--pad) var(--pad); }
  .route {
    height: 4px; border-radius: 999px;
    background: rgba(255,255,255,.14);
    position: relative;
  }
  .route .fill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--brand-deep), var(--brand));
    transform: scaleX(0); transform-origin: left center;
  }

  /* ── Экран "пусто" ── */
  #empty {
    position: fixed; inset: 0; z-index: 9;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); text-align: center; padding: 40px;
  }
  #empty h1 { font-size: clamp(22px,3vw,38px); font-weight: 700; margin: 16px 0 10px; }
  #empty p  { color: var(--muted); font-size: 17px; line-height: 1.65; }
  #empty code { color: var(--brand); }

  /* ── Кнопка включения звука ── */
  #soundhint {
    position: fixed; z-index: 8;
    left: 50%; bottom: calc(var(--pad) + 22px);
    transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 20px;
    background: rgba(7,16,10,.82);
    border: 1px solid rgba(45,190,0,.4);
    border-radius: 999px;
    color: #fff; font-size: 15px; font-weight: 500;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
    cursor: pointer; pointer-events: auto;
    transition: opacity .4s ease, transform .4s ease;
  }
  #soundhint svg { display: block; }
  #soundhint.gone { opacity: 0; transform: translateX(-50%) translateY(10px); pointer-events: none; }

  .hidden { display: none !important; }

  /* ── Мобильная адаптация ── */
  @media (max-width: 600px) {
    :root { --pad: 14px; --frame-gap: 10px; --radius: 14px; }
    body { cursor: auto; }
    .clock .time { font-size: 30px; letter-spacing: -1px; }
    .clock .weekday, .clock .date { font-size: 12px; }
    .clock .dateline { margin-top: 4px; }
    .route { height: 3px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .slide { transition: opacity 0.2s linear; }
  }
</style>
</head>
<body>

<div id="stage"><div id="media-frame"></div></div>

<div id="overlay">
  <div class="top">
    <div class="logo" id="logo">
      <svg width="34" height="34" viewBox="0 0 48 48" aria-hidden="true">
        <defs><clipPath id="sq"><rect x="2" y="2" width="44" height="44" rx="12"/></clipPath></defs>
        <g clip-path="url(#sq)">
          <rect x="0" y="0" width="48" height="48" fill="#ffffff"/>
          <polygon points="0,0 48,0 48,13 0,16" fill="#F5A623"/>
          <polygon points="0,19 48,16 48,38 0,41" fill="#3DAE36"/>
          <polygon points="0,44 48,41 48,48 0,48" fill="#8DC63F"/>
          <path d="M24 13 C18.5 13 14 17.3 14 22.5 C14 27 17.5 30.3 21.5 31.4 L21.5 36 C21.5 37.4 22.6 38.5 24 38.5 C25.4 38.5 26.5 37.4 26.5 36 L26.5 31.4 C30.5 30.3 34 27 34 22.5 C34 17.3 29.5 13 24 13 Z"
                fill="#1E88E5" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round"/>
        </g>
      </svg>
      <span class="word">2<b>ГИС</b></span>
    </div>
    <div class="clock" id="clock">
      <div class="time">--:--</div>
      <div class="dateline">
        <span class="weekday">&nbsp;</span>
        <span class="date">&nbsp;</span>
      </div>
    </div>
  </div>
  <div class="bottom">
    <div class="route">
      <div class="fill" id="routeFill"></div>
    </div>
  </div>
</div>

<div id="soundhint">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2DBE00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/>
  </svg>
  <span>Нажмите для звука</span>
</div>

<div id="empty">
  <div>
    <h1>Папка пуста</h1>
    <p>Добавьте файлы в <code>public/media</code> —<br>слайды появятся автоматически.</p>
  </div>
</div>

<script>
(() => {
  'use strict';

  const EPOCH = 0;
  const BUILD = 'build-9'; // версия кода; при изменении страница сама перезагрузится
  const DEFAULTS = { imageDuration: 10, muteVideo: false, showClock: true, showLogo: true, videoFallback: 30 };
  let CFG = Object.assign({}, DEFAULTS);

  const stage      = document.getElementById('media-frame');
  const emptyEl    = document.getElementById('empty');
  const clockEl    = document.getElementById('clock');
  const clockTime  = clockEl.querySelector('.time');
  const clockDay   = clockEl.querySelector('.weekday');
  const clockDate  = clockEl.querySelector('.date');
  const logoEl     = document.getElementById('logo');
  const routeFill  = document.getElementById('routeFill');

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let playlist = [], starts = [], total = 0, signature = '';
  let currentSlide = null, advanceTimer = null, rafId = null, running = false;
  let serverOffset = 0;

  // ── Звук через Web Audio API ──
  // Свойство video.volume на телефонах и многих ТВ ИГНОРИРУЕТСЯ железом.
  // Поэтому громкость регулируем через GainNode — он работает везде.
  const VOLUME = 0.1; // громкость видео (0..1)
  let soundOn = false;
  const soundHint = document.getElementById('soundhint');

  let audioCtx = null, gainNode = null;
  const sourceMap = new WeakMap(); // video -> MediaElementSourceNode (создаётся 1 раз)

  function ensureAudioGraph(){
    if(audioCtx) return true;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return false;
      audioCtx = new AC();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = VOLUME;
      gainNode.connect(audioCtx.destination);
      return true;
    } catch(e){ audioCtx = null; return false; }
  }

  // Подключаем видео к графу громкости (один раз на элемент)
  function routeVideo(v){
    if(!ensureAudioGraph()) { v.volume = VOLUME; return; } // фолбэк
    if(sourceMap.has(v)) return;
    try {
      const src = audioCtx.createMediaElementSource(v);
      src.connect(gainNode);
      sourceMap.set(v, src);
    } catch(e){ try { v.volume = VOLUME; } catch(_){} }
  }

  // Вызывается СИНХРОННО внутри обработчика события — критично для iOS
  function enableSound(){
    if(soundOn) return;
    soundOn = true;
    if(soundHint) soundHint.classList.add('gone');
    ensureAudioGraph();
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    const v = currentSlide && currentSlide.querySelector && currentSlide.querySelector('video');
    if(v && !CFG.muteVideo){
      routeVideo(v);
      v.muted = false;
      v.play().catch(()=>{});
    }
  }
  function unmuteCurrent(){
    if(CFG.muteVideo || !soundOn || !currentSlide) return;
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    const v = currentSlide.querySelector && currentSlide.querySelector('video');
    if(v){ routeVideo(v); v.muted = false; v.play().catch(()=>{}); }
  }

  // Кнопка soundhint: onclick вызывается синхронно — iOS это принимает как жест
  if(soundHint){
    soundHint.addEventListener('click', enableSound);
    soundHint.addEventListener('touchend', function(e){
      e.preventDefault(); // предотвращаем дублирующий click на iOS
      enableSound();
    });
  }

  // Глобальные слушатели для десктопа (passive:false чтобы iOS не блокировал play в touchstart)
  ['click','keydown','pointerdown'].forEach(ev =>
    addEventListener(ev, enableSound, { once: false, passive: true })
  );
  addEventListener('touchstart', enableSound, { once: false, passive: false });

  // ── Синхронизация времени ──
  async function syncTime(){
    try {
      const t0 = Date.now();
      const r = await fetch('api/now', { cache: 'no-store' });
      const j = await r.json();
      const t1 = Date.now();
      serverOffset = j.now - (t0 + (t1 - t0) / 2);
    } catch(e){}
  }
  function nowSec(){ return (Date.now() + serverOffset) / 1000; }

  async function fetchPlaylist(){
    const r = await fetch('api/playlist', { cache: 'no-store' });
    return r.json();
  }

  // Не зондируем видео заранее — это создаёт N скрытых декодеров и убивает ТВ.
  // Длину видео узнаём во время воспроизведения; для таймлайна используем videoFallback.
  function buildTimeline(items){
    const durs = items.map(it => it.type === 'image' ? CFG.imageDuration : CFG.videoFallback);
    starts = [0];
    for(let i = 0; i < durs.length; i++) starts.push(starts[i] + Math.max(durs[i], 0.5));
    total = starts[starts.length - 1] || 1;
  }

  function currentSlot(){
    const t = (((nowSec() - EPOCH) % total) + total) % total;
    let i = 0;
    while(i < starts.length - 2 && starts[i+1] <= t) i++;
    const dur = starts[i+1] - starts[i];
    return { i, dur, localOffset: t - starts[i], remaining: starts[i+1] - t };
  }

  // ── Часы ──
  const DAYS   = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  function tickClock(){
    if(!CFG.showClock) return;
    const d = new Date(Date.now() + serverOffset);
    clockTime.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    clockDay.textContent  = DAYS[d.getDay()];
    clockDate.textContent = `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }
  setInterval(tickClock, 1000);

  // ── Прогресс (только CSS-трансформа — без rAF, лёгкая для ТВ) ──
  function setProgress(p){
    p = Math.max(0, Math.min(1, p));
    routeFill.style.transition = 'none';
    routeFill.style.transform  = 'scaleX(' + p + ')';
  }
  function animateProgress(fromP, ms){
    fromP = Math.max(0, Math.min(1, fromP));
    routeFill.style.transition = 'none';
    routeFill.style.transform  = 'scaleX(' + fromP + ')';
    void routeFill.offsetWidth; // форс-рефлоу, чтобы стартовая позиция применилась
    routeFill.style.transition = 'transform ' + ms + 'ms linear';
    routeFill.style.transform  = 'scaleX(1)';
  }

  let stallTimer = null;
  function clearAdvance(){ clearTimeout(advanceTimer); if(stallTimer){ clearInterval(stallTimer); stallTimer = null; } }

  // ── Строим слайд ──
  function buildSlide(item, onReady, onFail){
    const el = document.createElement('div');
    el.className = 'slide';

    if(item.type === 'image'){
      const img = new Image();
      img.onload  = () => onReady(el);
      img.onerror = onFail;
      img.src = item.url;
      el.appendChild(img);
    } else {
      const v = document.createElement('video');
      v.src         = item.url;
      v.muted       = true;
      v.playsInline = true;
      v.preload     = 'auto'; // одно видео за раз — буферизуем заранее для плавного старта

      let fired = false;
      const fire = () => { if(!fired){ fired = true; onReady(el); } };

      v.oncanplay        = fire;
      v.onloadeddata     = fire;
      v.onloadedmetadata = () => { if(!fired) setTimeout(fire, 400); };
      // жёсткий фолбэк — показываем через 3с что бы ни было
      setTimeout(fire, 3000);
      v.onerror = () => { fire(); }; // при ошибке тоже пропускаем

      el.appendChild(v);
    }
    return el;
  }

  function syncTick(){
    if(!running || !playlist.length) return;
    const slot = currentSlot();
    showSlide(playlist[slot.i], slot);
  }

  // Переходим к следующему слайду по порядку (не пересинхронизируем по часам)
  function nextSlide(){
    if(!running || !playlist.length) return;
    const cur = playlist.findIndex((_, i) => {
      const el = currentSlide;
      return el && el._itemIdx === i;
    });
    const next = (cur < 0 || cur >= playlist.length - 1) ? 0 : cur + 1;
    const dur = starts[next + 1] - starts[next];
    showSlide(playlist[next], { i: next, dur, localOffset: 0, remaining: dur });
  }

  function showSlide(item, slot){
    clearAdvance();
    const el = buildSlide(
      item,
      r => mountSlide(r, item, slot),
      () => setTimeout(syncTick, 300)
    );
    el._guard = setTimeout(() => { if(currentSlide !== el){ el.remove(); } else { nextSlide(); } }, 6000);
  }

  function mountSlide(el, item, slot){
    clearTimeout(el._guard);
    const remMs = Math.max(slot.remaining, 0.05) * 1000;

    el._itemIdx = slot.i;

    stage.appendChild(el);
    void el.offsetWidth;
    el.classList.add('visible');

    const prev = currentSlide;
    currentSlide = el;
    if(prev){
      prev.classList.remove('visible');
      // Сразу освобождаем декодер старого видео, чтобы не было рывков
      const pvid = prev.querySelector && prev.querySelector('video');
      if(pvid){ try { pvid.pause(); } catch(e){} }
      setTimeout(() => {
        if(pvid){ try { pvid.removeAttribute('src'); pvid.load(); } catch(e){} }
        prev.remove();
      }, 700);
    }

    if(item.type === 'image'){
      const startP = slot.dur > 0 ? slot.localOffset / slot.dur : 0;
      setProgress(startP);
      animateProgress(startP, remMs);
      advanceTimer = setTimeout(nextSlide, remMs);
    } else {
      const v = el.querySelector('video');
      if(isFinite(v.duration) && v.duration > 0){
        try { v.currentTime = Math.min(slot.localOffset, v.duration - 0.1); } catch(e){}
      }
      // Всегда стартуем muted — браузер всегда разрешает автоплей без звука.
      v.muted = true;
      v.volume = VOLUME;
      v.play().then(() => {
        if(soundOn && !CFG.muteVideo){
          routeVideo(v);
          if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
          v.muted = false;
        }
      }).catch(() => {});

      v.addEventListener('timeupdate', () => {
        if(v.duration) setProgress(v.currentTime / v.duration);
      });

      // ended: переходим к СЛЕДУЮЩЕМУ по порядку (не пересинхронизируем по часам —
      // это вызывало бесконечный цикл когда видео короче videoFallback)
      v.addEventListener('ended', nextSlide);

      // Сторожевой таймер: если currentTime не двигается — видео зависло, пропускаем
      let lastTime = -1, stallCount = 0;
      stallTimer = setInterval(() => {
        if(currentSlide !== el){ clearInterval(stallTimer); stallTimer = null; return; }
        if(v.ended){ nextSlide(); return; }
        if(v.paused && !v.ended){ v.play().catch(()=>{}); }
        if(v.currentTime === lastTime){ stallCount++; if(stallCount >= 3){ nextSlide(); return; } }
        else { stallCount = 0; }
        lastTime = v.currentTime;
      }, 2000);

      // Абсолютный фолбэк по времени (на случай если видео намного длиннее fallback)
      advanceTimer = setTimeout(nextSlide, remMs);
    }

    // Предзагрузка следующего файла, чтобы не было лага при переключении
    prefetchNext(slot.i);
  }

  // Тянем следующий медиафайл в кэш заранее (плавный старт/конец)
  let prefetchEl = null;
  function prefetchNext(i){
    if(!playlist.length) return;
    const next = playlist[(i + 1) % playlist.length];
    if(!next) return;
    if(prefetchEl){ try{ prefetchEl.src = ''; }catch(e){} prefetchEl = null; }
    // ВАЖНО: видео заранее НЕ грузим — второй декодер вешает слабые ТВ и
    // даёт рывки в конце текущего ролика. Предзагружаем только картинки.
    if(next.type === 'image'){
      const img = new Image();
      img.src = next.url;
      prefetchEl = img;
    }
  }

  async function applyPlaylist(data){
    if(data.config) CFG = Object.assign({}, DEFAULTS, data.config);
    if(!CFG.showClock) clockEl.classList.add('hidden');
    if(!CFG.showLogo)  logoEl.classList.add('hidden');

    const items = (data.items || []).map(it => ({
      name: it.name, type: it.type,
      url: it.url || ('media/' + encodeURIComponent(it.name))
    }));

    if(items.length === 0){
      running = false; clearAdvance();
      if(currentSlide){
        currentSlide.classList.remove('visible');
        const c = currentSlide;
        setTimeout(() => c.remove(), 950);
        currentSlide = null;
      }
      emptyEl.classList.remove('hidden');
      signature = data.signature || '';
      return;
    }

    emptyEl.classList.add('hidden');
    playlist = items;
    signature = data.signature || '';

    // кнопка звука нужна только если есть видео и звук не отключён
    const hasVideo = items.some(it => it.type === 'video');
    if(soundHint){
      if(hasVideo && !CFG.muteVideo && !soundOn) soundHint.classList.remove('gone');
      else soundHint.classList.add('gone');
    }
    buildTimeline(items);
    tickClock();
    if(!running){ running = true; syncTick(); }
  }

  async function poll(){
    try {
      const data = await fetchPlaylist();
      if((data.signature || '') !== signature) await applyPlaylist(data);
    } catch(e){}
  }

  // ── Авто-обновление: табло сутками не перезагружается само ──
  // Проверяем, не вышла ли новая версия кода, и перезагружаем страницу.
  async function checkVersion(){
    try {
      const r = await fetch('/?v=' + Date.now(), { cache: 'no-store' });
      const html = await r.text();
      const m = html.match(/BUILD\s*=\s*'([^']+)'/);
      if(m && m[1] && m[1] !== BUILD){
        location.reload();
      }
    } catch(e){}
  }

  async function boot(){
    await syncTime();
    try {
      const data = await fetchPlaylist();
      await applyPlaylist(data);
    } catch(e){
      emptyEl.querySelector('h1').textContent = 'Нет связи с сервером';
      emptyEl.querySelector('p').innerHTML = 'Проверьте, что сервер запущен, и обновите страницу.';
    }
    setInterval(poll, 30000);
    setInterval(syncTime, 300000);
    setInterval(checkVersion, 120000); // раз в 2 минуты
  }

  boot();
})();
</script>
</body>
</html>
