<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>2ГИС — Экран офиса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #2DBE00;
    --brand-deep: #15890A;
    --bg: #07100A;
    --border: rgba(255,255,255,.07);
    --ink: #ffffff;
    --muted: rgba(255,255,255,.42);
    --font: "Geist", "Segoe UI", system-ui, -apple-system, sans-serif;
    --sidebar: clamp(200px, 22vw, 320px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    cursor: none;
  }

  /* ── Основная сетка ── */
  #app {
    display: grid;
    grid-template-columns: var(--sidebar) 1fr var(--sidebar);
    grid-template-rows: 1fr 5px;
    height: 100vh;
  }

  /* ── Боковые панели ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(28px, 3.6vh, 56px) clamp(24px, 2.4vw, 40px);
  }
  #sidebar-left  { border-right: 1px solid var(--border); }
  #sidebar-right { border-left:  1px solid var(--border); align-items: flex-end; text-align: right; }

  /* ── Логотип ── */
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 18px 8px 9px;
    background: rgba(255,255,255,.96);
    border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,.35);
    flex-shrink: 0;
  }
  .logo svg { display: block; border-radius: 8px; flex-shrink: 0; }
  .logo .word { font-weight: 800; font-size: clamp(18px, 1.6vw, 24px); line-height: 1; color: #1a1a1a; }

  /* ── Декоративная линия ── */
  .deco-line {
    height: 1px; width: 48px;
    background: linear-gradient(90deg, var(--brand), transparent);
    opacity: .5; border-radius: 1px;
  }
  #sidebar-right .deco-line {
    background: linear-gradient(270deg, var(--brand), transparent);
  }

  /* ── Часы ── */
  .clock { display: flex; flex-direction: column; align-items: flex-end; }
  .clock .time {
    display: inline-block;
    font-size: clamp(48px, 5.2vw, 82px); font-weight: 600;
    font-variant-numeric: tabular-nums; line-height: 1;
    letter-spacing: -2px; white-space: nowrap;
  }
  .clock .dateline {
    margin-top: 10px;
    display: flex; align-items: center; justify-content: flex-end; gap: 10px;
  }
  .clock .weekday {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: clamp(13px, 1.3vw, 19px); font-weight: 500;
    color: rgba(255,255,255,.92); text-transform: capitalize;
  }
  .clock .weekday::before {
    content: ""; width: 7px; height: 7px; flex-shrink: 0;
    border-radius: 50%; background: var(--brand);
    box-shadow: 0 0 10px rgba(45,190,0,.9);
  }
  .clock .weekday::after {
    content: ""; width: 4px; height: 4px; margin-left: 2px;
    border-radius: 50%; background: rgba(255,255,255,.28);
  }
  .clock .date {
    font-size: clamp(13px, 1.3vw, 19px); font-weight: 500; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Центральная сцена ── */
  #stage {
    position: relative;
    background: #000;
    overflow: hidden;
  }

  /* ── Слайды — только opacity, GPU-friendly ── */
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; opacity: 0;
    transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .slide.visible { opacity: 1; }
  .slide img   { width: 100%; height: 100%; object-fit: contain; display: block; }
  .slide video { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }

  /* ── Прогресс ── */
  #progressbar {
    grid-column: 1 / -1;
    position: relative;
    background: rgba(255,255,255,.08);
  }
  #routeFill {
    position: absolute; inset: 0; width: 0%;
    background: linear-gradient(90deg, var(--brand-deep), var(--brand));
    box-shadow: 0 0 10px rgba(45,190,0,.55);
  }

  /* ── Экран "пусто" ── */
  #empty {
    position: fixed; inset: 0; z-index: 9;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); text-align: center; padding: 40px;
  }
  #empty h1 { font-size: clamp(22px,3vw,38px); font-weight: 700; margin: 16px 0 10px; }
  #empty p  { color: var(--muted); font-size: 17px; line-height: 1.65; }
  #empty code { color: var(--brand); }

  .hidden { display: none !important; }

  /* ── Мобильная адаптация ── */
  @media (max-width: 700px) {
    :root { --sidebar: 100%; }
    body { cursor: auto; }
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto 4px;
    }
    #sidebar-left {
      border-right: none; border-bottom: 1px solid var(--border);
      flex-direction: row; align-items: center; justify-content: flex-start;
      padding: 14px 18px; grid-row: 1;
    }
    #stage       { grid-row: 2; }
    #sidebar-right {
      border-left: none; border-top: 1px solid var(--border);
      flex-direction: row; align-items: center; justify-content: space-between;
      padding: 12px 18px; grid-row: 3; text-align: left;
    }
    #progressbar { grid-row: 4; }
    .deco-line   { display: none; }
    .clock       { align-items: flex-start; }
    .clock .time { font-size: 30px; letter-spacing: -1px; }
    .clock .dateline { justify-content: flex-start; margin-top: 4px; }
    .clock .weekday, .clock .date { font-size: 13px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .slide { transition: opacity 0.2s linear; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="sidebar-left" class="sidebar">
    <div class="logo" id="logo">
      <svg width="34" height="34" viewBox="0 0 48 48" aria-hidden="true">
        <defs><clipPath id="sq"><rect x="2" y="2" width="44" height="44" rx="12"/></clipPath></defs>
        <g clip-path="url(#sq)">
          <rect x="0" y="0" width="48" height="48" fill="#ffffff"/>
          <polygon points="0,0 48,0 48,13 0,16" fill="#F5A623"/>
          <polygon points="0,19 48,16 48,38 0,41" fill="#3DAE36"/>
          <polygon points="0,44 48,41 48,48 0,48" fill="#8DC63F"/>
          <path d="M24 13 C18.5 13 14 17.3 14 22.5 C14 27 17.5 30.3 21.5 31.4 L21.5 36 C21.5 37.4 22.6 38.5 24 38.5 C25.4 38.5 26.5 37.4 26.5 36 L26.5 31.4 C30.5 30.3 34 27 34 22.5 C34 17.3 29.5 13 24 13 Z"
                fill="#1E88E5" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round"/>
        </g>
      </svg>
      <span class="word">2<b>ГИС</b></span>
    </div>
    <div class="deco-line"></div>
  </div>

  <div id="stage"></div>

  <div id="sidebar-right" class="sidebar">
    <div class="clock" id="clock">
      <div class="time">--:--</div>
      <div class="dateline">
        <span class="weekday">&nbsp;</span>
        <span class="date">&nbsp;</span>
      </div>
    </div>
    <div class="deco-line"></div>
  </div>

  <div id="progressbar"><div id="routeFill"></div></div>

</div>

<div id="empty">
  <div>
    <h1>Папка пуста</h1>
    <p>Добавьте файлы в <code>public/media</code> —<br>слайды появятся автоматически.</p>
  </div>
</div>

<script>
(() => {
  'use strict';

  const EPOCH = 0;
  const DEFAULTS = { imageDuration: 10, muteVideo: false, showClock: true, showLogo: true, videoFallback: 30 };
  let CFG = Object.assign({}, DEFAULTS);

  const stage    = document.getElementById('stage');
  const emptyEl  = document.getElementById('empty');
  const clockEl  = document.getElementById('clock');
  const logoEl   = document.getElementById('logo');
  const routeFill= document.getElementById('routeFill');

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let playlist = [], starts = [], total = 0, signature = '';
  let currentSlide = null, advanceTimer = null, rafId = null, running = false;
  let serverOffset = 0;

  // ── Синхронизация с сервером ──
  async function syncTime(){
    try {
      const t0 = Date.now();
      const r = await fetch('api/now', { cache: 'no-store' });
      const j = await r.json();
      const t1 = Date.now();
      serverOffset = j.now - (t0 + (t1 - t0) / 2);
    } catch(e){}
  }
  function nowSec(){ return (Date.now() + serverOffset) / 1000; }

  async function fetchPlaylist(){
    const r = await fetch('api/playlist', { cache: 'no-store' });
    return r.json();
  }

  function probeVideo(url){
    return new Promise(resolve => {
      const v = document.createElement('video');
      let done = false;
      const finish = d => { if(done) return; done=true; try{ v.removeAttribute('src'); v.load(); }catch(e){} resolve(d); };
      v.preload = 'metadata'; v.muted = true; v.src = url;
      v.onloadedmetadata = () => finish(isFinite(v.duration) && v.duration > 0 ? v.duration : CFG.videoFallback);
      v.onerror = () => finish(CFG.videoFallback);
      setTimeout(() => finish(CFG.videoFallback), 10000);
    });
  }

  async function buildTimeline(items){
    const durs = await Promise.all(items.map(it =>
      it.type === 'image' ? Promise.resolve(CFG.imageDuration) : probeVideo(it.url)
    ));
    starts = [0];
    for(let i=0; i<durs.length; i++) starts.push(starts[i] + Math.max(durs[i], 0.5));
    total = starts[starts.length-1] || 1;
  }

  function currentSlot(){
    const t = (((nowSec() - EPOCH) % total) + total) % total;
    let i = 0;
    while(i < starts.length-2 && starts[i+1] <= t) i++;
    const dur = starts[i+1] - starts[i];
    return { i, dur, localOffset: t - starts[i], remaining: starts[i+1] - t };
  }

  // ── Часы ──
  const DAYS   = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  function tickClock(){
    if(!CFG.showClock) return;
    const d = new Date(Date.now() + serverOffset);
    clockEl.querySelector('.time').textContent =
      `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    clockEl.querySelector('.weekday').textContent = DAYS[d.getDay()];
    clockEl.querySelector('.date').textContent    = `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }
  setInterval(tickClock, 1000);

  // ── Прогресс ──
  function setProgress(p){ routeFill.style.width = (Math.max(0,Math.min(1,p))*100)+'%'; }
  function animateProgress(fromP, ms){
    cancelAnimationFrame(rafId);
    fromP = Math.max(0, Math.min(1, fromP));
    const s = performance.now();
    const step = n => {
      const k = (n-s)/ms;
      setProgress(fromP + (1-fromP)*k);
      if(k < 1) rafId = requestAnimationFrame(step);
    };
    rafId = requestAnimationFrame(step);
  }

  function clearAdvance(){ clearTimeout(advanceTimer); cancelAnimationFrame(rafId); }

  // ── Строим слайд ──
  function buildSlide(item, onReady, onFail){
    const el = document.createElement('div');
    el.className = 'slide';

    if(item.type === 'image'){
      const img = new Image();
      img.onload  = () => onReady(el);
      img.onerror = onFail;
      img.src = item.url;
      el.appendChild(img);
    } else {
      const v = document.createElement('video');
      v.src = item.url;
      v.muted      = !!CFG.muteVideo;
      v.playsInline = true;
      v.preload    = 'auto';
      v.autoplay   = false; // запускаем вручную после mount

      let fired = false;
      const fire = () => { if(!fired){ fired=true; onReady(el); } };

      v.oncanplay      = fire;
      v.onloadeddata   = fire;
      v.onloadedmetadata = () => { if(!fired) setTimeout(fire, 400); };
      // жёсткий фолбэк — если ничего не сработало за 4с, показываем как есть
      setTimeout(() => { if(!fired){ fired=true; onReady(el); } }, 4000);
      v.onerror = onFail;

      el.appendChild(v);
    }
    return el;
  }

  function syncTick(){
    if(!running || !playlist.length) return;
    showSlide(playlist[currentSlot().i], currentSlot());
  }

  function showSlide(item, slot){
    clearAdvance();
    const el = buildSlide(
      item,
      r => mountSlide(r, item, slot),
      () => setTimeout(syncTick, 300)
    );
    // гард: если onReady не позвали за 6с — пропускаем
    el._guard = setTimeout(() => { if(currentSlide !== el){ el.remove(); syncTick(); } }, 6000);
  }

  async function playVideo(v){
    try {
      await v.play();
    } catch(e){
      // Autoplay заблокирован со звуком — пробуем без звука
      v.muted = true;
      try { await v.play(); } catch(e2){}
    }
  }

  function mountSlide(el, item, slot){
    clearTimeout(el._guard);
    const remMs = Math.max(slot.remaining, 0.05) * 1000;

    stage.appendChild(el);
    void el.offsetWidth; // force reflow для transition
    el.classList.add('visible');

    const prev = currentSlide;
    currentSlide = el;
    if(prev){
      prev.classList.remove('visible');
      setTimeout(() => prev.remove(), 900);
    }

    if(item.type === 'image'){
      const startP = slot.dur > 0 ? slot.localOffset / slot.dur : 0;
      setProgress(startP);
      animateProgress(startP, remMs);
      advanceTimer = setTimeout(syncTick, remMs);
    } else {
      const v = el.querySelector('video');
      // Устанавливаем позицию и запускаем
      if(isFinite(v.duration) && v.duration > 0){
        try { v.currentTime = Math.min(slot.localOffset, v.duration - 0.1); } catch(e){}
      }
      playVideo(v);
      v.addEventListener('timeupdate', () => {
        if(v.duration) setProgress(v.currentTime / v.duration);
      });
      v.addEventListener('ended', () => syncTick());
      advanceTimer = setTimeout(syncTick, remMs);
    }
  }

  async function applyPlaylist(data){
    if(data.config) CFG = Object.assign({}, DEFAULTS, data.config);
    if(!CFG.showClock) clockEl.closest('.sidebar').classList.add('hidden');
    if(!CFG.showLogo)  logoEl.classList.add('hidden');

    const items = (data.items || []).map(it => ({
      name: it.name, type: it.type,
      url: it.url || ('media/' + encodeURIComponent(it.name))
    }));

    if(items.length === 0){
      running = false; clearAdvance();
      if(currentSlide){ currentSlide.classList.remove('visible'); const c=currentSlide; setTimeout(()=>c.remove(),900); currentSlide=null; }
      emptyEl.classList.remove('hidden');
      signature = data.signature || '';
      return;
    }

    emptyEl.classList.add('hidden');
    playlist = items; signature = data.signature || '';
    await buildTimeline(items);
    tickClock();
    if(!running){ running=true; syncTick(); }
  }

  async function poll(){
    try {
      const data = await fetchPlaylist();
      if((data.signature||'') !== signature) await applyPlaylist(data);
    } catch(e){}
  }

  async function boot(){
    await syncTime();
    try {
      const data = await fetchPlaylist();
      await applyPlaylist(data);
    } catch(e){
      emptyEl.querySelector('h1').textContent = 'Нет связи с сервером';
      emptyEl.querySelector('p').innerHTML = 'Проверьте, что сервер запущен, и обновите страницу.';
    }
    setInterval(poll, 8000);
    setInterval(syncTime, 60000);
  }

  boot();
})();
</script>
</body>
</html>
