<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1A12"/>
      <stop offset="1" stop-color="#06120B"/>
    </linearGradient>
    <radialGradient id="accent" cx="50%" cy="34%" r="46%">
      <stop offset="0" stop-color="#2DBE00" stop-opacity=".28"/>
      <stop offset="1" stop-color="#2DBE00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2DBE00" stop-opacity=".55"/>
      <stop offset="1" stop-color="#2DBE00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#accent)"/>

  <!-- subtle dotted map grid -->
  <g fill="#2DBE00" fill-opacity=".07">
    <!-- generated dot grid -->
    <g>
      <circle cx="160" cy="160" r="3"/><circle cx="320" cy="160" r="3"/><circle cx="480" cy="160" r="3"/><circle cx="640" cy="160" r="3"/><circle cx="800" cy="160" r="3"/><circle cx="960" cy="160" r="3"/><circle cx="1120" cy="160" r="3"/><circle cx="1280" cy="160" r="3"/><circle cx="1440" cy="160" r="3"/><circle cx="1600" cy="160" r="3"/><circle cx="1760" cy="160" r="3"/>
      <circle cx="160" cy="320" r="3"/><circle cx="320" cy="320" r="3"/><circle cx="480" cy="320" r="3"/><circle cx="640" cy="320" r="3"/><circle cx="800" cy="320" r="3"/><circle cx="1120" cy="320" r="3"/><circle cx="1280" cy="320" r="3"/><circle cx="1440" cy="320" r="3"/><circle cx="1600" cy="320" r="3"/><circle cx="1760" cy="320" r="3"/>
      <circle cx="160" cy="920" r="3"/><circle cx="320" cy="920" r="3"/><circle cx="480" cy="920" r="3"/><circle cx="640" cy="920" r="3"/><circle cx="800" cy="920" r="3"/><circle cx="960" cy="920" r="3"/><circle cx="1120" cy="920" r="3"/><circle cx="1280" cy="920" r="3"/><circle cx="1440" cy="920" r="3"/><circle cx="1600" cy="920" r="3"/><circle cx="1760" cy="920" r="3"/>
    </g>
  </g>

  <!-- hero pin -->
  <g transform="translate(960,360)">
    <circle cx="0" cy="0" r="190" fill="url(#pinGlow)"/>
    <ellipse cx="0" cy="208" rx="78" ry="16" fill="#000000" opacity=".35"/>
    <path d="M0 -120 C-66 -120 -120 -66 -120 0 C-120 80 0 200 0 200 C0 200 120 80 120 0 C120 -66 66 -120 0 -120 Z" fill="#2DBE00"/>
    <circle cx="0" cy="-12" r="46" fill="#0C1A12"/>
  </g>

  <!-- text -->
  <g text-anchor="middle">
    <text x="960" y="700" fill="#2DBE00" font-size="32" font-weight="700" letter-spacing="8">2ГИС · ОФИС</text>
    <text x="960" y="810" fill="#FFFFFF" font-size="118" font-weight="800" letter-spacing="-1">Добро пожаловать</text>
    <text x="960" y="884" fill="#FFFFFF" fill-opacity=".55" font-size="40" font-weight="400">Рады видеть вас сегодня</text>
  </g>
</svg>
