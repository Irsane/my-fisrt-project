<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23C13F"/>
      <stop offset="1" stop-color="#0A6F1B"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg1)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>

  <!-- map decoration -->
  <g stroke="#FFFFFF" stroke-opacity=".10" stroke-width="16" fill="none" stroke-linecap="round">
    <path d="M-50 250 L640 250 L780 390 L2000 390"/>
    <path d="M-50 900 L560 900 L700 760 L2000 760"/>
    <path d="M260 -50 L260 1130"/>
    <path d="M1640 -50 L1640 1130"/>
  </g>

  <!-- hero pin -->
  <g transform="translate(960,400)">
    <ellipse cx="0" cy="250" rx="120" ry="26" fill="#000000" opacity=".15"/>
    <path d="M0 -150 C-83 -150 -150 -83 -150 0 C-150 100 0 250 0 250 C0 250 150 100 150 0 C150 -83 83 -150 0 -150 Z" fill="#FFFFFF"/>
    <circle cx="0" cy="-10" r="66" fill="#2DBE00"/>
  </g>

  <!-- text -->
  <g fill="#FFFFFF" text-anchor="middle">
    <text x="960" y="800" font-size="130" font-weight="800" letter-spacing="-1">Добро пожаловать</text>
    <text x="960" y="888" font-size="46" font-weight="500" fill-opacity=".92">в офис 2ГИС — рады вас видеть</text>
  </g>
</svg>
