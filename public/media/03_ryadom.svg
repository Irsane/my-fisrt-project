<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7B500"/>
      <stop offset="1" stop-color="#E07B00"/>
    </linearGradient>
    <radialGradient id="glow3" cx="80%" cy="80%" r="70%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".25"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="sq3"><rect x="2" y="2" width="44" height="44" rx="12"/></clipPath>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg3)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>

  <!-- map roads -->
  <g stroke="#FFFFFF" stroke-opacity=".18" stroke-width="16" fill="none" stroke-linecap="round">
    <path d="M-50 320 L600 320 L740 460 L2000 460"/>
    <path d="M-50 820 L900 820 L1040 680 L2000 680"/>
    <path d="M520 -50 L520 1130"/>
    <path d="M1320 -50 L1320 1130"/>
  </g>

  <!-- category pins -->
  <g transform="translate(1180,300)">
    <g transform="translate(0,0)">
      <path d="M0 -54 C-30 -54 -54 -30 -54 0 C-54 36 0 92 0 92 C0 92 54 36 54 0 C54 -30 30 -54 0 -54 Z" fill="#2DBE00"/>
      <circle cx="0" cy="-4" r="22" fill="#fff"/>
    </g>
    <g transform="translate(260,120)">
      <path d="M0 -54 C-30 -54 -54 -30 -54 0 C-54 36 0 92 0 92 C0 92 54 36 54 0 C54 -30 30 -54 0 -54 Z" fill="#1E88E5"/>
      <circle cx="0" cy="-4" r="22" fill="#fff"/>
    </g>
    <g transform="translate(120,420)">
      <path d="M0 -54 C-30 -54 -54 -30 -54 0 C-54 36 0 92 0 92 C0 92 54 36 54 0 C54 -30 30 -54 0 -54 Z" fill="#E53935"/>
      <circle cx="0" cy="-4" r="22" fill="#fff"/>
    </g>
    <g transform="translate(440,360)">
      <path d="M0 -54 C-30 -54 -54 -30 -54 0 C-54 36 0 92 0 92 C0 92 54 36 54 0 C54 -30 30 -54 0 -54 Z" fill="#6D4C41"/>
      <circle cx="0" cy="-4" r="22" fill="#fff"/>
    </g>
  </g>

  <!-- logo badge -->
  <g transform="translate(120,90)">
    <rect width="290" height="96" rx="48" fill="#FFFFFF"/>
    <g transform="translate(28,20) scale(1.16)">
      <g clip-path="url(#sq3)">
        <rect x="0" y="0" width="48" height="48" fill="#ffffff"/>
        <polygon points="0,0 48,0 48,13 0,16" fill="#F5A623"/>
        <polygon points="0,19 48,16 48,38 0,41" fill="#3DAE36"/>
        <polygon points="0,44 48,41 48,48 0,48" fill="#8DC63F"/>
        <path d="M24 13 C18.5 13 14 17.3 14 22.5 C14 27 17.5 30.3 21.5 31.4 L21.5 36 C21.5 37.4 22.6 38.5 24 38.5 C25.4 38.5 26.5 37.4 26.5 36 L26.5 31.4 C30.5 30.3 34 27 34 22.5 C34 17.3 29.5 13 24 13 Z" fill="#1E88E5" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round"/>
      </g>
    </g>
    <text x="116" y="62" font-size="44" font-weight="800" fill="#1a1a1a">2ГИС</text>
  </g>

  <!-- text -->
  <g transform="translate(120,360)" fill="#FFFFFF">
    <text font-size="124" font-weight="800" letter-spacing="-1">Всё, что</text>
    <text y="140" font-size="124" font-weight="800" letter-spacing="-1">рядом</text>
  </g>

  <!-- category chips -->
  <g transform="translate(120,720)" font-size="40" font-weight="700">
    <g><rect width="240" height="84" rx="42" fill="#FFFFFF"/><text x="120" y="55" text-anchor="middle" fill="#0A6F1B">Кафе</text></g>
    <g transform="translate(272,0)"><rect width="300" height="84" rx="42" fill="#FFFFFF"/><text x="150" y="55" text-anchor="middle" fill="#0A6F1B">Аптеки</text></g>
    <g transform="translate(604,0)"><rect width="280" height="84" rx="42" fill="#FFFFFF"/><text x="140" y="55" text-anchor="middle" fill="#0A6F1B">Банки</text></g>
    <g transform="translate(916,0)"><rect width="380" height="84" rx="42" fill="#FFFFFF"/><text x="190" y="55" text-anchor="middle" fill="#0A6F1B">Парковки</text></g>
  </g>
</svg>
