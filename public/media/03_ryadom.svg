<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7B500"/>
      <stop offset="1" stop-color="#E07B00"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".20"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg3)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>

  <g stroke="#FFFFFF" stroke-opacity=".16" stroke-width="16" fill="none" stroke-linecap="round">
    <path d="M-50 280 L640 280 L780 420 L2000 420"/>
    <path d="M-50 860 L920 860 L1060 720 L2000 720"/>
    <path d="M520 -50 L520 1130"/>
    <path d="M1400 -50 L1400 1130"/>
  </g>

  <!-- headline -->
  <text x="960" y="300" text-anchor="middle" fill="#FFFFFF" font-size="132" font-weight="800" letter-spacing="-1">Всё, что рядом</text>

  <!-- pins cluster -->
  <g transform="translate(960,560)">
    <g transform="translate(-360,0)"><path d="M0 -60 C-33 -60 -60 -33 -60 0 C-60 40 0 100 0 100 C0 100 60 40 60 0 C60 -33 33 -60 0 -60 Z" fill="#2DBE00"/><circle cx="0" cy="-5" r="24" fill="#fff"/></g>
    <g transform="translate(-120,40)"><path d="M0 -60 C-33 -60 -60 -33 -60 0 C-60 40 0 100 0 100 C0 100 60 40 60 0 C60 -33 33 -60 0 -60 Z" fill="#1E88E5"/><circle cx="0" cy="-5" r="24" fill="#fff"/></g>
    <g transform="translate(120,40)"><path d="M0 -60 C-33 -60 -60 -33 -60 0 C-60 40 0 100 0 100 C0 100 60 40 60 0 C60 -33 33 -60 0 -60 Z" fill="#E53935"/><circle cx="0" cy="-5" r="24" fill="#fff"/></g>
    <g transform="translate(360,0)"><path d="M0 -60 C-33 -60 -60 -33 -60 0 C-60 40 0 100 0 100 C0 100 60 40 60 0 C60 -33 33 -60 0 -60 Z" fill="#6D4C41"/><circle cx="0" cy="-5" r="24" fill="#fff"/></g>
  </g>

  <!-- chips -->
  <g transform="translate(960,800)" font-size="40" font-weight="700" fill="#0A6F1B">
    <g transform="translate(-690,0)"><rect width="240" height="84" rx="42" fill="#FFFFFF"/><text x="120" y="55" text-anchor="middle">Кафе</text></g>
    <g transform="translate(-420,0)"><rect width="300" height="84" rx="42" fill="#FFFFFF"/><text x="150" y="55" text-anchor="middle">Аптеки</text></g>
    <g transform="translate(-90,0)"><rect width="280" height="84" rx="42" fill="#FFFFFF"/><text x="140" y="55" text-anchor="middle">Банки</text></g>
    <g transform="translate(230,0)"><rect width="380" height="84" rx="42" fill="#FFFFFF"/><text x="190" y="55" text-anchor="middle">Парковки</text></g>
  </g>
</svg>
