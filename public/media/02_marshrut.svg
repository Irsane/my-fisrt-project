<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#103E73"/>
      <stop offset="1" stop-color="#06203F"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#2DBE00" stop-opacity=".18"/>
      <stop offset="1" stop-color="#2DBE00" stop-opacity="0"/>
    </radialGradient>
    <filter id="rshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#2DBE00" flood-opacity=".85"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg2)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>

  <!-- grid -->
  <g stroke="#FFFFFF" stroke-opacity=".06" stroke-width="2">
    <path d="M0 220 H1920 M0 420 H1920 M0 620 H1920 M0 820 H1920"/>
    <path d="M320 0 V1080 M640 0 V1080 M960 0 V1080 M1280 0 V1080 M1600 0 V1080"/>
  </g>

  <!-- headline -->
  <text x="960" y="300" text-anchor="middle" fill="#FFFFFF" font-size="128" font-weight="800" letter-spacing="-1">Построим маршрут</text>
  <text x="960" y="380" text-anchor="middle" fill="#FFFFFF" fill-opacity=".82" font-size="44" font-weight="500">Быстрая навигация по городу — пешком, на авто и транспорте</text>

  <!-- route -->
  <path d="M360 760 C560 760 580 560 820 560 C1080 560 1060 600 1300 600 L1560 600"
        fill="none" stroke="#2DBE00" stroke-width="18" stroke-linecap="round" filter="url(#rshadow)"/>
  <path d="M360 760 C560 760 580 560 820 560 C1080 560 1060 600 1300 600 L1560 600"
        fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 28" opacity=".9"/>

  <circle cx="360" cy="760" r="22" fill="#FFFFFF"/>
  <circle cx="360" cy="760" r="11" fill="#2DBE00"/>
  <g transform="translate(1560,600)">
    <path d="M0 -80 C-44 -80 -80 -44 -80 0 C-80 53 0 132 0 132 C0 132 80 53 80 0 C80 -44 44 -80 0 -80 Z" fill="#F5A623"/>
    <circle cx="0" cy="-6" r="32" fill="#FFFFFF"/>
  </g>
</svg>
